<script>
const QUESTIONS = [
// ---- Chapter 25: Structure & Function ----
{ch:25,topic:"Circulation",q:"The right side of the heart pumps blood through which circuit?",
 options:["Systemic circulation","Pulmonary circulation","Coronary circulation","Portal circulation"],correct:1,
 rationale:"The <b>right heart</b> drives <b>pulmonary circulation</b> (deoxygenated blood to the lungs for gas exchange); the <b>left heart</b> drives systemic circulation to the body."},

{ch:25,topic:"Cardiac Cycle",q:"Which statement accurately describes blood flow through the heart?",
 options:["Blood flows from the left ventricle through the bicuspid valve.","Blood flows from the right atrium through the aortic valve to the right ventricle.","Blood flows from the right ventricle through the pulmonic semilunar valve.","Blood flows from the left atrium through the tricuspid valve to the left ventricle."],correct:2,
 rationale:"Right ventricle → <b>pulmonic semilunar valve</b> → pulmonary artery is correct. The bicuspid (mitral) valve sits between left atrium and left ventricle, not after it; the tricuspid valve is right-sided only; the aortic valve exits the left ventricle."},

{ch:25,topic:"Heart Wall",q:"Which layer of the heart wall is composed of cardiac muscle?",
 options:["Epicardium","Myocardium","Endocardium","Pericardium"],correct:1,
 rationale:"Outer to inner: <b>epicardium</b> (outer covering) → <b>myocardium</b> (contractile cardiac muscle) → <b>endocardium</b> (inner lining). The pericardium is the surrounding sac, not a wall layer."},

{ch:25,topic:"Cardiac Cycle",q:"During diastole, which pressure relationship allows the AV valves to stay open and ventricles to fill?",
 options:["Ventricular pressure exceeds atrial pressure","Atrial pressure exceeds ventricular pressure","Aortic pressure exceeds ventricular pressure","Pressures are equal throughout"],correct:1,
 rationale:"In diastole the ventricles are relaxed, so <b>atrial pressure is higher</b> than ventricular pressure, pushing the AV valves open and blood flows passively into the ventricles."},

{ch:25,topic:"Coronary Circulation",q:"Occlusion of the left anterior descending (LAD) artery most directly threatens perfusion to which region?",
 options:["The SA node","The anterior wall of the left ventricle and interventricular septum","The right atrium only","The posterior descending branch territory"],correct:1,
 rationale:"The LAD is a branch of the left coronary artery and is the classic \"widow-maker\" vessel supplying the <b>anterior LV wall and septum</b> — this is why LAD occlusion carries high mortality."},

{ch:25,topic:"Conduction",q:"Put the cardiac conduction pathway in correct order.",
 options:["AV node → SA node → bundle branches → Purkinje fibers","SA node → AV node → bundle of His → bundle branches → Purkinje fibers","Purkinje fibers → bundle of His → SA node → AV node","SA node → Purkinje fibers → AV node → bundle of His"],correct:1,
 rationale:"The intrinsic pacemaker sequence is <b>SA node → AV node → bundle of His → right/left bundle branches → Purkinje fibers</b>, which is why the SA node sets normal sinus rhythm."},

{ch:25,topic:"Action Potentials",q:"What is the physiologic purpose of the cardiac refractory period?",
 options:["To increase heart rate during exercise","To prevent tetanic contraction and allow time for ventricular filling","To generate the P wave on ECG","To increase myocardial oxygen demand"],correct:1,
 rationale:"Unlike skeletal muscle, cardiac muscle has a long refractory period that <b>prevents summation/tetany</b>, ensuring the heart always relaxes and refills between beats — essential for it to function as a pump."},

{ch:25,topic:"Myocardial Cells",q:"Which of the following is TRUE regarding cardiac vs. skeletal muscle fibers?",
 options:["Cardiac fibers have fewer mitochondria than skeletal muscle fibers.","Cardiac fibers are parallel, and skeletal muscle fibers are branched.","Cardiac fibers have a slower transmission than skeletal muscle fibers.","Cardiac fibers have only one nucleus, and skeletal muscle fibers have many nuclei."],correct:3,
 rationale:"Cardiac myocytes are typically <b>uninucleate</b> (occasionally binucleate) while skeletal muscle fibers are <b>multinucleated</b>. Cardiac cells actually have MORE mitochondria (high oxygen demand) and are connected via intercalated disks, not arranged in parallel like skeletal fibers."},

{ch:25,topic:"Cardiac Output",q:"A patient has a heart rate of 80 bpm and a stroke volume of 65 mL. What is the approximate cardiac output?",
 options:["1.45 L/min","5.2 L/min","8.0 L/min","65 L/min"],correct:1,
 rationale:"CO = HR × SV = 80 × 65 mL ≈ 5,200 mL/min ≈ <b>5.2 L/min</b>, consistent with the normal adult resting CO of ~5 L/min."},

{ch:25,topic:"CO Regulation",q:"Preload is best described as:",
 options:["Resistance the left ventricle must overcome to eject blood","The volume/pressure stretching the ventricle at end-diastole","The heart's intrinsic contractile strength independent of stretch","The resistance in the pulmonary vasculature"],correct:1,
 rationale:"<b>Preload</b> = end-diastolic volume/pressure stretching the ventricle (Frank-Starling relationship). <b>Afterload</b> is the resistance the ventricle must overcome to eject blood, largely set by systemic vascular resistance in the aorta."},

{ch:25,topic:"Vessels/BP",q:"Per Poiseuille's law, which vessel property has the greatest effect on resistance to blood flow?",
 options:["Vessel length","Blood viscosity","Vessel radius/diameter","Vessel color"],correct:2,
 rationale:"Resistance is inversely proportional to the <b>fourth power of the radius</b>, so small changes in vessel diameter (e.g., vasoconstriction, atherosclerotic narrowing) have a disproportionately large effect on resistance and flow."},

{ch:25,topic:"Lymphatic",q:"What is the primary function of the lymphatic system as covered in this chapter?",
 options:["Producing red blood cells","Picking up excess interstitial fluid and returning it to the bloodstream","Generating the heartbeat","Regulating blood pressure directly via baroreceptors"],correct:1,
 rationale:"The lymphatic system collects excess fluid that leaks from capillaries into tissue and <b>returns it to the venous circulation</b> via the thoracic duct and right lymphatic duct, preventing tissue edema."},

// ---- Chapter 26: Alterations of Cardiovascular Function ----
{ch:26,topic:"Venous Disease",q:"Virchow's triad, which predisposes to thrombus formation, includes all of the following EXCEPT:",
 options:["Venous stasis","Endothelial damage","Hypercoagulability","Arterial vasodilation"],correct:3,
 rationale:"Virchow's triad = <b>venous stasis, endothelial (intimal) damage, and hypercoagulable states</b>. Arterial vasodilation is not a component."},

{ch:26,topic:"Venous Disease",q:"Chronic venous insufficiency most often leads to which complication?",
 options:["Venous stasis ulcers","Aortic dissection","Cardiac tamponade","Pulmonic stenosis"],correct:0,
 rationale:"Long-standing inadequate venous return (from varicose veins or valve incompetence) causes chronically elevated venous pressure and poor tissue perfusion, resulting in <b>venous stasis ulcers</b>, typically at the medial malleolus."},

{ch:26,topic:"Venous Disease",q:"Why is superior vena cava (SVC) syndrome considered an oncologic emergency?",
 options:["It always indicates metastatic bone disease","Progressive SVC occlusion causes venous distention of the head/upper body and can compromise airway and cardiac filling","It causes immediate cardiac arrest in all cases","It only affects pediatric oncology patients"],correct:1,
 rationale:"SVC syndrome results from progressive occlusion (often by tumor compression) of the SVC, causing venous congestion of the head, neck, and upper extremities — it can rapidly threaten airway patency and venous return, requiring urgent management."},

{ch:26,topic:"Hypertension",q:"Per the values presented in this course, sustained hypertension is defined as a systolic BP at or above:",
 options:["110 mm Hg","120 mm Hg","130 mm Hg","150 mm Hg"],correct:2,
 rationale:"The slides define hypertension as sustained <b>systolic ≥130 mm Hg or diastolic ≥80 mm Hg</b>, consistent with current ACC/AHA thresholds — know this exact cutoff, since it differs from the older 140/90 standard."},

{ch:26,topic:"Hypertension",q:"What proportion of hypertension cases are classified as primary (essential/idiopathic)?",
 options:["Only about 10%","About 50%","Roughly 92–95%","100%, secondary HTN does not exist"],correct:2,
 rationale:"<b>Primary hypertension accounts for 92–95%</b> of cases and results from a combination of genetic and environmental/lifestyle factors. Secondary hypertension (renal, adrenal, drug-induced) makes up the remainder."},

{ch:26,topic:"Hypertension",q:"A patient presents with systolic BP of 200 mm Hg and diastolic BP of 130 mm Hg with evidence of end-organ damage. This is classified as:",
 options:["Primary hypertension","Orthostatic hypotension","Hypertensive crisis","Chronic venous insufficiency"],correct:2,
 rationale:"<b>Hypertensive crisis</b> is defined as systolic >180 and/or diastolic >120 mm Hg and is life-threatening, requiring urgent BP reduction to prevent target organ damage."},

{ch:26,topic:"Hypotension",q:"Orthostatic (postural) hypotension occurs due to:",
 options:["Excess intravascular volume","Failure of normal compensatory mechanisms for gravitational blood pooling upon standing","Hypertrophic cardiomyopathy","Increased cardiac contractility"],correct:1,
 rationale:"On standing, blood pools in the lower extremities; normally baroreceptor reflexes compensate rapidly. In orthostatic hypotension, this <b>compensation fails</b>, causing a drop in systolic and diastolic BP and symptoms like dizziness."},

{ch:26,topic:"Aneurysm",q:"A false aneurysm is best described as:",
 options:["Weakening of all three vessel wall layers with a true outpouching","An extravascular hematoma that communicates with the intravascular space","A dilation limited to the tunica intima only","A vessel with no risk of rupture"],correct:1,
 rationale:"A <b>true aneurysm</b> involves weakening of all three wall layers. A <b>false aneurysm</b> is actually a contained hematoma outside the vessel wall that still communicates with the vascular lumen — essentially a contained leak, not a true wall dilation."},

{ch:26,topic:"Atherosclerosis",q:"Put the stages of atherosclerotic progression in correct order.",
 options:["Fibrous plaque → fatty streak → endothelial inflammation → foam cell formation","Endothelial inflammation → macrophage migration/LDL oxidation (foam cells) → fatty streak → fibrous plaque → complicated plaque","Complicated plaque → fatty streak → endothelial inflammation","Foam cell formation → complicated plaque → endothelial inflammation"],correct:1,
 rationale:"Atherosclerosis progresses: <b>endothelial inflammation → macrophage adherence/migration → LDL oxidation and foam cell formation → fatty streak → fibrous plaque → complicated plaque</b>, ultimately causing inadequate perfusion, ischemia, and necrosis."},

{ch:26,topic:"CAD/Angina",q:"A client reports intermittent chest pain that occurs predictably after exercise and resolves with rest. This pattern is most consistent with:",
 options:["Prinzmetal (vasospastic) angina","Stable angina from atherosclerotic plaque progression","Acute pericarditis","Mitral valve prolapse"],correct:1,
 rationale:"Predictable, exertional chest pain relieved by rest is the hallmark of <b>stable angina</b>, caused by fixed atherosclerotic narrowing that limits coronary flow when myocardial oxygen demand rises. Prinzmetal angina occurs at rest due to vasospasm, often unrelated to exertion."},

{ch:26,topic:"CAD/Angina",q:"Prinzmetal angina is primarily caused by:",
 options:["Fixed atherosclerotic stenosis only","Coronary artery vasospasm","Valvular regurgitation","Pericardial effusion"],correct:1,
 rationale:"<b>Prinzmetal angina</b> results from transient coronary artery vasospasm, often occurring at rest or with a cyclical pattern (e.g., early morning), distinguishing it from classic exertional stable angina."},

{ch:26,topic:"MI",q:"A STEMI (ST-elevation MI) is generally associated with which type of infarct?",
 options:["Subendocardial (partial-thickness) infarct","Transmural (full-thickness) infarct","No myocardial necrosis","Isolated pericardial infarct"],correct:1,
 rationale:"STEMI typically reflects a <b>transmural</b> (full-thickness) infarction from complete coronary occlusion, whereas NSTEMI more often reflects a subendocardial (partial-thickness) infarct."},

{ch:26,topic:"Pericardium",q:"Cardiac tamponade most directly causes which hemodynamic problem?",
 options:["Increased stroke volume from fluid overload","Compression of the heart by pericardial fluid, impairing filling and decreasing cardiac output","Excessive coronary blood flow","Valvular stenosis"],correct:1,
 rationale:"In tamponade, fluid accumulates in the pericardial sac and <b>compresses the heart</b>, restricting ventricular filling during diastole and dropping stroke volume and cardiac output — a medical emergency."},

{ch:26,topic:"Myocardium",q:"Which cardiomyopathy is characterized by a stiff, poorly compliant ventricle that impairs diastolic filling while systolic function is often preserved?",
 options:["Dilated cardiomyopathy","Hypertrophic cardiomyopathy","Restrictive cardiomyopathy","Mitral valve prolapse"],correct:2,
 rationale:"<b>Restrictive cardiomyopathy</b> involves rigid, noncompliant ventricular walls that impair filling (diastolic dysfunction), while ejection fraction may remain normal. Dilated CM impairs systolic contraction in an enlarged chamber; hypertrophic CM involves thickened myocardium, often obstructing outflow."},

{ch:26,topic:"Endocardium",q:"Which physical exam findings are classically associated with infective endocarditis?",
 options:["Osler nodes and Janeway lesions","Erythema marginatum and subcutaneous nodules","Homans sign and pitting edema","Kussmaul sign and pulsus paradoxus"],correct:0,
 rationale:"<b>Osler nodes</b> (painful, immune-complex-mediated nodules on fingers/toes) and <b>Janeway lesions</b> (painless hemorrhagic macules on palms/soles) are classic peripheral stigmata of infective endocarditis, alongside fever and new/changed murmur."},

{ch:26,topic:"Rheumatic Fever",q:"Which of the following is a MAJOR clinical manifestation of acute rheumatic fever (part of the classic diagnostic criteria)?",
 options:["Tachycardia","Epistaxis","Carditis","Nausea and vomiting"],correct:2,
 rationale:"Major manifestations include <b>carditis, polyarthritis, chorea, erythema marginatum, and subcutaneous nodules</b>. Fever, tachycardia, epistaxis, and GI symptoms are common but classified as minor/associated findings, not major diagnostic criteria."},

{ch:26,topic:"Heart Failure",q:"Systolic heart failure is defined by an ejection fraction of less than:",
 options:["70%","55%","40%","20% only"],correct:2,
 rationale:"Systolic (HFrEF) heart failure is defined by an <b>ejection fraction below ~40%</b>, reflecting impaired contractility, in contrast to diastolic heart failure (HFpEF), where EF is preserved but filling is impaired."},

{ch:26,topic:"Heart Failure",q:"An S3 gallop is most associated with which type of heart failure, and an S4 gallop with which?",
 options:["S3 = diastolic HF; S4 = systolic HF","S3 = systolic HF; S4 = diastolic HF","Both S3 and S4 only occur in right heart failure","Neither is associated with heart failure"],correct:1,
 rationale:"<b>S3</b> (rapid ventricular filling into a volume-overloaded, poorly contractile ventricle) is associated with <b>systolic HF</b>. <b>S4</b> (atrial contraction into a stiff, noncompliant ventricle) is associated with <b>diastolic HF</b>."},

{ch:26,topic:"Heart Failure",q:"Right heart failure is most commonly caused by:",
 options:["Isolated mitral valve prolapse","Chronic hypoxic pulmonary disease leading to pulmonary hypertension","Acute rheumatic fever","Hyperthyroidism alone"],correct:1,
 rationale:"Right heart failure most often results from <b>diffuse hypoxic pulmonary disease</b> (e.g., COPD) causing pulmonary hypertension, which raises the workload on the right ventricle — this is termed cor pulmonale."},

{ch:26,topic:"Heart Failure",q:"High-output heart failure can result from all of the following EXCEPT:",
 options:["Anemia","Hyperthyroidism","Aortic stenosis with reduced contractility","Septicemia"],correct:2,
 rationale:"High-output failure occurs when the heart cannot meet the body's metabolic demand despite <b>normal or elevated contractility and adequate volume</b> — caused by anemia, hyperthyroidism, sepsis, and beriberi. Aortic stenosis with reduced contractility describes a low-output problem instead."},

{ch:26,topic:"Shock",q:"A client has adequate intravascular volume but is experiencing decreased cardiac output and tissue hypoxia due to pump failure. Which type of shock is this?",
 options:["Neurogenic shock","Cardiogenic shock","Hypovolemic shock","Anaphylactic shock"],correct:1,
 rationale:"<b>Cardiogenic shock</b> results from the heart's failure to pump effectively despite adequate circulating volume, distinguishing it from hypovolemic shock (inadequate volume) and the distributive shocks (neurogenic, anaphylactic, septic), which involve vasodilation/maldistribution."},

{ch:26,topic:"Shock",q:"Which type of shock results from a sudden loss of sympathetic vascular tone, often after spinal cord injury?",
 options:["Septic shock","Neurogenic shock","Hypovolemic shock","Cardiogenic shock"],correct:1,
 rationale:"<b>Neurogenic shock</b> results from disrupted autonomic (sympathetic) control of vascular smooth muscle tone, causing widespread vasodilation, hypotension, and often bradycardia — classically after spinal cord injury."},

{ch:26,topic:"MODS",q:"What is the most common precipitating cause of multiple organ dysfunction syndrome (MODS)?",
 options:["Sepsis/septic shock","Isolated peripheral artery disease","Chronic venous insufficiency","Mitral valve prolapse"],correct:0,
 rationale:"MODS most commonly arises from an uncontrolled systemic inflammatory response to <b>sepsis/septic shock</b>, though severe trauma, burns, and major surgery are also recognized causes."},

// ---- Chapter 27: Pediatric Cardiovascular Alterations ----
{ch:27,topic:"Congenital Classification",q:"A cyanotic congenital heart defect is defined by which shunt direction?",
 options:["Left-to-right shunt","Right-to-left shunt","No shunt is present","Bidirectional shunt only in adulthood"],correct:1,
 rationale:"Cyanotic defects involve a <b>right-to-left shunt</b>, allowing deoxygenated blood to bypass the lungs and enter systemic circulation directly, producing visible cyanosis. Acyanotic defects involve left-to-right shunting."},

{ch:27,topic:"Increased Pulm Flow",q:"A newborn has a characteristic continuous 'machinery-like' murmur on auscultation. This is most indicative of:",
 options:["Tetralogy of Fallot","Ventricular septal defect","Patent ductus arteriosus","Atrioventricular septal defect"],correct:2,
 rationale:"The classic continuous <b>\"machinery-like\" murmur</b> is pathognomonic for <b>patent ductus arteriosus (PDA)</b> — failure of the ductus arteriosus to close, allowing continuous aorta-to-pulmonary-artery shunting."},

{ch:27,topic:"Increased Pulm Flow",q:"Which congenital defect is the most common type of congenital heart lesion overall?",
 options:["Atrial septal defect","Ventricular septal defect (VSD)","Tetralogy of Fallot","Truncus arteriosus"],correct:1,
 rationale:"<b>VSD</b> is the most common congenital heart lesion. An opening between the ventricles allows left-to-right shunting, which over time can raise pulmonary pressures and, if untreated, progress to Eisenmenger syndrome (shunt reversal)."},

{ch:27,topic:"Obstructive",q:"Coarctation of the aorta classically presents with which clinical clue in older, previously undiagnosed children?",
 options:["Hypertension in the upper extremities with weaker lower extremity pulses","Cyanosis of the lips only","Hearing loss","Isolated jaundice"],correct:0,
 rationale:"Coarctation narrows the aortic lumen, typically near the ductus arteriosus, causing <b>higher BP/stronger pulses in the upper extremities</b> and diminished pressure/pulses in the lower extremities if it goes undiagnosed until later in childhood."},

{ch:27,topic:"Decreased Pulm Flow",q:"Tetralogy of Fallot includes all of the following EXCEPT:",
 options:["Ventricular septal defect","Overriding aorta","Pulmonary valve stenosis","Patent ductus arteriosus"],correct:3,
 rationale:"Tetralogy of Fallot = <b>VSD + overriding aorta + pulmonary stenosis + right ventricular hypertrophy</b>. PDA is a separate, distinct defect and not one of the four Tetralogy components."},

{ch:27,topic:"Decreased Pulm Flow",q:"A pediatric client is diagnosed with a cyanotic heart defect. Which of the following is classified as cyanotic?",
 options:["Tetralogy of Fallot","Ventricular septal defect","Patent ductus arteriosus","Atrioventricular septal defect"],correct:0,
 rationale:"<b>Tetralogy of Fallot</b> causes a right-to-left shunt (via the VSD and RV outflow obstruction), making it cyanotic. VSD, PDA, and AV canal defects are acyanotic, left-to-right shunting lesions."},

{ch:27,topic:"Mixing Defects",q:"In transposition of the great arteries, why is the physiology so dangerous without a coexisting shunt?",
 options:["It creates a single mixed circuit that is well oxygenated","It creates two separate, parallel circuits so deoxygenated blood recirculates systemically without ever being oxygenated","It causes immediate cardiac arrest at birth in all cases","It only affects the lymphatic system"],correct:1,
 rationale:"Because the aorta arises from the right ventricle and the pulmonary artery from the left, <b>two parallel, non-mixing circuits</b> form — systemic blood never reaches the lungs. Survival depends on a coexisting shunt (PDA, ASD, or VSD) to allow blood mixing."},

{ch:27,topic:"Mixing Defects",q:"Truncus arteriosus is always associated with which other defect?",
 options:["Atrial septal defect","Ventricular septal defect","Coarctation of the aorta","Pulmonic stenosis"],correct:1,
 rationale:"Truncus arteriosus (failure of the embryonic trunk to separate into aorta and pulmonary artery) is <b>always accompanied by a VSD</b>, since the single great vessel overrides both ventricles."},

{ch:27,topic:"Mixing Defects",q:"Hypoplastic left heart syndrome is best described as:",
 options:["A benign defect requiring no intervention","Underdevelopment of the left heart structures that is fatal in early life if untreated","A defect limited to the tricuspid valve","An acquired disorder occurring after age 5"],correct:1,
 rationale:"Hypoplastic left heart syndrome involves severe <b>underdevelopment of the left ventricle, aorta, and aortic arch</b>. It presents with cyanosis, tachypnea, and decreased cardiac output in the newborn period and is fatal without surgical intervention."},

{ch:27,topic:"Acquired-Kawasaki",q:"The most serious cardiac complication clinicians monitor for in Kawasaki disease is:",
 options:["Mitral valve prolapse","Coronary artery aneurysms","Aortic coarctation","Pulmonic stenosis"],correct:1,
 rationale:"Kawasaki disease is an acute systemic vasculitis; its most feared complication is the development of <b>coronary artery aneurysms</b>, which typically appear during the disease's second pathologic stage (roughly days 13–25)."},

{ch:27,topic:"Acquired-Kawasaki",q:"Which of the following is one of the classic diagnostic findings for Kawasaki disease (5 of 6 required)?",
 options:["Bilateral conjunctivitis without exudate","Productive cough","Bradycardia","Hypotension"],correct:0,
 rationale:"Diagnostic criteria include fever ≥5 days plus at least 4 of: <b>bilateral non-exudative conjunctivitis</b>, oral mucosa changes (strawberry tongue), extremity changes with desquamation, polymorphous rash, and cervical lymphadenopathy."},

{ch:27,topic:"Pediatric HTN",q:"How does hypertension in children typically differ from hypertension in adults?",
 options:["It is almost always primary/essential in children","An underlying secondary cause (e.g., renal disease, coarctation) is almost always identified","Children are always symptomatic","Obesity is never a contributing factor in children"],correct:1,
 rationale:"Unlike adults, where primary HTN dominates, pediatric hypertension <b>usually has an identifiable underlying cause</b> (renal disease, coarctation of the aorta, etc.), though primary hypertension related to obesity is increasingly seen in older children."},

{ch:27,topic:"Congenital Classification",q:"Aside from prematurity, congenital heart disease is the leading cause of death in which age group?",
 options:["Adolescents","Infants in the first year of life","Adults over 65","School-age children"],correct:1,
 rationale:"Congenital heart disease is a major cause of death in the <b>first year of life</b>, second only to prematurity itself — underscoring the importance of prenatal and neonatal screening."},
];

const CONGENITAL_TABLE = [
 {group:"Increased Pulmonary Blood Flow (Acyanotic, Left-to-Right Shunt)", rows:[
   ["Patent Ductus Arteriosus (PDA)","Aorta → pulmonary artery","Acyanotic","Continuous machinery-like murmur; risk of endocarditis"],
   ["Atrial Septal Defect (ASD)","Left atrium → right atrium","Acyanotic","Often asymptomatic early; pulmonary symptoms with exertion later"],
   ["Ventricular Septal Defect (VSD)","Left ventricle → right ventricle","Acyanotic","Most common congenital heart lesion; risk of Eisenmenger syndrome if untreated"],
   ["AV Canal Defect (AVC)","Left-to-right, pulmonary overcirculation","Acyanotic","Endocardial cushion fusion failure; irreversible pulmonary HTN if untreated"],
 ]},
 {group:"Obstructive Defects", rows:[
   ["Coarctation of the Aorta","No shunt — mechanical narrowing","Acyanotic (usually)","Upper-extremity HTN with weaker lower-extremity pulses"],
   ["Aortic Stenosis","No shunt — valvular narrowing","Acyanotic","LV hypertrophy; faint pulses/hypotension in infants"],
   ["Pulmonic Stenosis","No shunt (unless severe → R-to-L via ASD)","Usually acyanotic; cyanotic if severe","RV hypertrophy; harsh systolic murmur + ejection click"],
 ]},
 {group:"Decreased Pulmonary Blood Flow (Cyanotic, Right-to-Left Shunt)", rows:[
   ["Tetralogy of Fallot","Right-to-left (VSD + RV outflow obstruction)","Cyanotic","VSD + overriding aorta + pulmonic stenosis + RVH; \"tet\" spells"],
   ["Tricuspid Atresia","Right-to-left; no RA–RV communication","Cyanotic","Tricuspid valve fails to develop; often paired with pulmonic stenosis"],
 ]},
 {group:"Mixing Defects", rows:[
   ["Transposition of the Great Arteries","Two parallel non-mixing circuits","Cyanotic","Survival depends on a coexisting shunt (PDA/ASD/VSD)"],
   ["Total Anomalous Pulmonary Venous Connection","Pulmonary veins drain to right heart","Cyanotic","Worsens with venous obstruction"],
   ["Truncus Arteriosus","Single great vessel overrides both ventricles","Cyanotic (variable)","Always associated with a VSD"],
   ["Hypoplastic Left Heart Syndrome","Left heart underdeveloped; systemic flow duct-dependent","Cyanotic","Fatal in early life without surgical intervention"],
 ]},
];

let state = {chapter:"all", topic:"all", answered:{}};

function chapterLabel(ch){return ch===25?"Ch 25":ch===26?"Ch 26":"Ch 27";}
function chapterClass(ch){return "ch"+ch;}

function uniqueTopics(list){
  const seen = new Set();
  list.forEach(q=>seen.add(q.topic));
  return Array.from(seen);
}

function renderChapterTabs(){
  const el = document.getElementById("chapterTabs");
  const chapters = [["all","All Chapters"],[25,"Ch 25 · Structure & Function"],[26,"Ch 26 · Alterations (Adult)"],[27,"Ch 27 · Pediatric"]];
  el.innerHTML = "";
  chapters.forEach(([val,label])=>{
    const b = document.createElement("button");
    b.className="tab";
    b.textContent=label;
    b.setAttribute("aria-pressed", String(state.chapter===val));
    b.onclick=()=>{state.chapter=val; state.topic="all"; renderAll();};
    el.appendChild(b);
  });
}

function renderTopicChips(){
  const el = document.getElementById("topicChips");
  const pool = state.chapter==="all" ? QUESTIONS : QUESTIONS.filter(q=>q.chapter===state.chapter||q.ch===state.chapter);
  const topics = uniqueTopics(pool.filter(q=>state.chapter==="all"?true:q.ch===state.chapter));
  el.innerHTML="";
  const allChip = document.createElement("button");
  allChip.className="chip";
  allChip.textContent="All topics";
  allChip.setAttribute("aria-pressed", String(state.topic==="all"));
  allChip.onclick=()=>{state.topic="all"; renderAll();};
  el.appendChild(allChip);
  topics.forEach(t=>{
    const c=document.createElement("button");
    c.className="chip";
    c.textContent=t;
    c.setAttribute("aria-pressed", String(state.topic===t));
    c.onclick=()=>{state.topic=t; renderAll();};
    el.appendChild(c);
  });
}

function filteredQuestions(){
  return QUESTIONS.filter(q=>{
    const chOk = state.chapter==="all" ? true : q.ch===state.chapter;
    const topicOk = state.topic==="all" ? true : q.topic===state.topic;
    return chOk && topicOk;
  });
}

function renderQuiz(){
  const container = document.getElementById("quizContainer");
  const list = filteredQuestions();
  container.innerHTML="";
  if(list.length===0){
    container.innerHTML = '<div class="empty">No questions match this filter.</div>';
  }
  list.forEach((q,idx)=>{
    const id = q.ch+"_"+idx+"_"+q.topic.replace(/\s+/g,"");
    const card = document.createElement("div");
    card.className="card";
    const tagrow = document.createElement("div");
    tagrow.className="tagrow";
    tagrow.innerHTML = `<span class="tag ${chapterClass(q.ch)}">${chapterLabel(q.ch)}</span><span class="tag topic">${q.topic}</span>`;
    card.appendChild(tagrow);

    const qtext = document.createElement("div");
    qtext.className="qtext";
    qtext.textContent = q.q;
    card.appendChild(qtext);

    const opts = document.createElement("div");
    opts.className="options";
    const answered = state.answered[id];
    q.options.forEach((optText,oi)=>{
      const b = document.createElement("button");
      b.className="opt"+(answered!==undefined?" disabled":"");
      b.textContent = optText;
      if(answered!==undefined){
        if(oi===q.correct) b.classList.add("correct");
        else if(oi===answered) b.classList.add("wrong");
      }
      b.onclick=()=>{
        if(state.answered[id]!==undefined) return;
        state.answered[id]=oi;
        renderQuiz();
        updateStats();
      };
      opts.appendChild(b);
    });
    card.appendChild(opts);

    const rationale = document.createElement("div");
    rationale.className="rationale"+(answered!==undefined?" show":"");
    rationale.innerHTML = q.rationale;
    card.appendChild(rationale);

    container.appendChild(card);
  });
}

function updateStats(){
  const list = filteredQuestions();
  const ids = list.map((q,idx)=>q.ch+"_"+idx+"_"+q.topic.replace(/\s+/g,""));
  let answeredCount=0, correctCount=0;
  ids.forEach((id,i)=>{
    if(state.answered[id]!==undefined){
      answeredCount++;
      if(state.answered[id]===list[i].correct) correctCount++;
    }
  });
  document.getElementById("statAnswered").textContent=answeredCount;
  document.getElementById("statCorrect").textContent=correctCount;
  document.getElementById("statTotal").textContent=list.length;
}

function renderTable(){
  const el = document.getElementById("tableContainer");
  let html = '<div class="tablewrap"><table><thead><tr><th>Defect</th><th>Shunt / Physiology</th><th>Cyanotic?</th><th>Key Feature</th></tr></thead><tbody>';
  CONGENITAL_TABLE.forEach(section=>{
    html += `<tr class="grp-header"><td colspan="4">${section.group}</td></tr>`;
    section.rows.forEach(r=>{
      const cyanClass = r[2].toLowerCase().includes("cyanotic") && !r[2].toLowerCase().includes("acyanotic") ? "cyanotic" : "acyanotic";
      html += `<tr><td><b>${r[0]}</b></td><td>${r[1]}</td><td class="${cyanClass}">${r[2]}</td><td>${r[3]}</td></tr>`;
    });
  });
  html += "</tbody></table></div>";
  el.innerHTML = html;
}

function renderAll(){
  renderChapterTabs();
  renderTopicChips();
  renderQuiz();
  updateStats();
}

document.getElementById("resetBtn").onclick=()=>{
  state.answered={};
  renderQuiz();
  updateStats();
};

document.getElementById("quizViewBtn").onclick=()=>{
  document.getElementById("quizContainer").style.display="block";
  document.getElementById("tableContainer").style.display="none";
  document.getElementById("quizViewBtn").classList.remove("secondary");
  document.getElementById("tableViewBtn").classList.add("secondary");
};
document.getElementById("tableViewBtn").onclick=()=>{
  document.getElementById("quizContainer").style.display="none";
  document.getElementById("tableContainer").style.display="block";
  document.getElementById("tableViewBtn").classList.remove("secondary");
  document.getElementById("quizViewBtn").classList.add("secondary");
};

renderTable();
renderAll();
</script>
</body>
</html>
